name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26.x"

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - { goos: linux,  goarch: amd64 }
          - { goos: linux,  goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: derive metadata
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${REF_NAME#v}"
          channel=stable
          if [[ "$ver" == *-* ]]; then
            tail="${ver##*-}"
            if [[ "$tail" =~ ^[0-9]+$ ]]; then
              channel=nightly
            fi
          fi
          {
            echo "version=$ver"
            echo "channel=$channel"
            echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_OUTPUT"

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          CHANNEL: ${{ steps.meta.outputs.channel }}
        run: |
          set -euo pipefail
          mkdir -p dist
          out="dist/intent-${GOOS}-${GOARCH}"
          short_sha="${SHA:0:7}"
          ldflags="-s -w \
            -X github.com/CoreyRDean/intent/internal/version.Version=${REF_NAME} \
            -X github.com/CoreyRDean/intent/internal/version.Commit=${short_sha} \
            -X github.com/CoreyRDean/intent/internal/version.BuildDate=${BUILD_DATE} \
            -X github.com/CoreyRDean/intent/internal/version.Channel=${CHANNEL}"
          go build -trimpath -ldflags "$ldflags" -o "$out" ./cmd/intent

          cp INTENT.md README.md LICENSE dist/
          tar -C dist -czf "${out}.tar.gz" \
            "intent-${GOOS}-${GOARCH}" \
            INTENT.md README.md LICENSE
          rm -f dist/INTENT.md dist/README.md dist/LICENSE

      - uses: actions/upload-artifact@v4
        with:
          name: intent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/intent-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: classify channel
        id: cls
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${REF_NAME#v}"
          prerelease=false
          channel=stable
          if [[ "$ver" == *-* ]]; then
            tail="${ver##*-}"
            if [[ "$tail" =~ ^[0-9]+$ ]]; then
              channel=nightly
              prerelease=true
            else
              prerelease=true
            fi
          fi
          {
            echo "prerelease=$prerelease"
            echo "channel=$channel"
          } >> "$GITHUB_OUTPUT"

      - name: checksums
        run: |
          set -euo pipefail
          cd dist
          shasum -a 256 intent-* > SHA256SUMS
          cat SHA256SUMS

      - name: release notes
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          CHANNEL: ${{ steps.cls.outputs.channel }}
        run: |
          set -euo pipefail
          short_sha="${SHA:0:7}"
          if [ "$CHANNEL" = "nightly" ]; then
            {
              echo "Nightly build of intent."
              echo
              echo "Built from commit \`${short_sha}\` at $(date -u +%Y-%m-%dT%H:%M:%SZ)."
              echo
              echo "These builds may break, change behavior, or eat your homework. They exist so we can dogfood."
            } > notes.md
          else
            {
              echo "Stable release ${REF_NAME}."
              echo
              echo "See [INTENT.md](https://github.com/CoreyRDean/intent/blob/${REF_NAME}/INTENT.md) for the project contract and [docs/SPEC.md](https://github.com/CoreyRDean/intent/blob/${REF_NAME}/docs/SPEC.md) for the implementation spec."
            } > notes.md
          fi

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: notes.md
          prerelease: ${{ steps.cls.outputs.prerelease == 'true' }}
          generate_release_notes: ${{ steps.cls.outputs.channel == 'stable' }}
          files: |
            dist/intent-*
            dist/SHA256SUMS

  brew:
    name: publish homebrew formula
    needs: release
    if: needs.release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: classify channel
        id: cls
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${REF_NAME#v}"
          channel=stable
          if [[ "$ver" == *-* ]]; then
            tail="${ver##*-}"
            if [[ "$tail" =~ ^[0-9]+$ ]]; then
              channel=nightly
            else
              channel=prerelease
            fi
          fi
          {
            echo "version=$ver"
            echo "channel=$channel"
          } >> "$GITHUB_OUTPUT"

      # Skip the formula bump for nightlies and prereleases. Homebrew
      # users live on the stable channel; nightly users use install.sh.
      - name: skip non-stable
        if: steps.cls.outputs.channel != 'stable'
        run: |
          echo "channel=${{ steps.cls.outputs.channel }} — not bumping formula"
          exit 0

      - name: download release assets
        if: steps.cls.outputs.channel == 'stable'
        env:
          REF_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p assets
          gh release download "$REF_NAME" \
            --repo "${{ github.repository }}" \
            --pattern 'intent-darwin-*.tar.gz' \
            --pattern 'intent-linux-*.tar.gz' \
            --pattern 'SHA256SUMS' \
            --dir assets
          ls -la assets

      - name: render formula
        if: steps.cls.outputs.channel == 'stable'
        env:
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.cls.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          base_url="https://github.com/${REPO}/releases/download/${REF_NAME}"

          # Pull each per-arch sha out of SHA256SUMS, which has the form
          #   <sha>  intent-darwin-arm64.tar.gz
          sha_for() {
            local file="$1"
            awk -v f="$file" '$2==f {print $1; exit}' assets/SHA256SUMS
          }

          DARWIN_ARM64_SHA=$(sha_for "intent-darwin-arm64.tar.gz")
          DARWIN_AMD64_SHA=$(sha_for "intent-darwin-amd64.tar.gz")
          LINUX_ARM64_SHA=$(sha_for "intent-linux-arm64.tar.gz")
          LINUX_AMD64_SHA=$(sha_for "intent-linux-amd64.tar.gz")

          for v in DARWIN_ARM64_SHA DARWIN_AMD64_SHA LINUX_ARM64_SHA LINUX_AMD64_SHA; do
            if [ -z "${!v}" ]; then
              echo "missing sha: $v" >&2
              exit 1
            fi
          done

          mkdir -p out
          cat > out/intent.rb <<EOF
          # typed: false
          # frozen_string_literal: true

          # Auto-generated by .github/workflows/release.yml — do not edit by hand.
          class Intent < Formula
            desc "Natural-language command interpreter that turns intent into shell"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "${base_url}/intent-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "${base_url}/intent-darwin-amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${base_url}/intent-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "${base_url}/intent-linux-amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              os   = OS.mac? ? "darwin" : "linux"
              arch = Hardware::CPU.arm? ? "arm64" : "amd64"
              bin.install "intent-#{os}-#{arch}" => "intent"
              bin.install_symlink bin/"intent" => "i"
              doc.install "INTENT.md", "README.md"
            end

            def post_install
              # Best-effort: record that this binary came from Homebrew so
              # 'i update now' dispatches to 'brew upgrade intent' instead
              # of trying to re-run install.sh. Failure is non-fatal.
              system bin/"intent", "init", "record-install", "--method", "brew"
            rescue
              nil
            end

            def caveats
              <<~EOS
                Run first-run setup to download the local model and start the daemon:
                  i init

                For zsh users: install the shell hook so prompts containing ? * [ ]
                aren't glob-eaten by your shell:
                  echo 'eval "$(intent shell-init zsh)"  # intent shell hook' >> ~/.zshrc
                (i init will offer to do this automatically.)
              EOS
            end

            test do
              assert_match(/intent /, shell_output("#{bin}/intent --version"))
            end
          end
          EOF
          cat out/intent.rb

      - name: push to homebrew-tap
        if: steps.cls.outputs.channel == 'stable'
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.cls.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN secret not set; skipping tap push." >&2
            echo "Add a PAT with contents:write on CoreyRDean/homebrew-tap as HOMEBREW_TAP_TOKEN to enable." >&2
            exit 0
          fi
          tmp=$(mktemp -d)
          git clone --depth=1 "https://x-access-token:${TAP_TOKEN}@github.com/CoreyRDean/homebrew-tap.git" "$tmp/tap"
          mkdir -p "$tmp/tap/Formula"
          cp out/intent.rb "$tmp/tap/Formula/intent.rb"
          cd "$tmp/tap"
          git config user.name  "intent-release-bot"
          git config user.email "intent-release-bot@users.noreply.github.com"
          if git diff --quiet -- Formula/intent.rb; then
            echo "no changes to Formula/intent.rb"
            exit 0
          fi
          git add Formula/intent.rb
          git commit -m "intent ${VERSION}"
          git push origin HEAD
